services:
  - type: web
    name: bharat-voice-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: WHATSAPP_PROVIDER
        value: twilio
      - key: ASR_DEVICE
        value: cpu
      - key: TEMP_DIR
        value: /tmp
